<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nexus CRM | Authorization</title>
    <meta name="description" content="Secure authorization gateway for Nexus CRM Enterprise Edition." />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-high": "#e6e8ea",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#2c0051",
                        "on-tertiary-fixed-variant": "#6900b3",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-container": "#131b2e",
                        "on-secondary-fixed": "#07006c",
                        "tertiary-fixed": "#f0dbff",
                        "surface": "#f7f9fb",
                        "secondary-fixed-dim": "#c0c1ff",
                        "secondary-fixed": "#e1e0ff",
                        "inverse-primary": "#bec6e0",
                        "inverse-surface": "#2d3133",
                        "on-primary-fixed": "#131b2e",
                        "outline-variant": "#c6c6cd",
                        "on-tertiary-container": "#ac59fb",
                        "tertiary-fixed-dim": "#ddb7ff",
                        "secondary-container": "#6063ee",
                        "secondary": "#4648d4",
                        "surface-variant": "#e0e3e5",
                        "primary-fixed-dim": "#bec6e0",
                        "on-secondary-container": "#fffbff",
                        "on-background": "#191c1e",
                        "primary-fixed": "#dae2fd",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-container": "#2c0051",
                        "on-surface": "#191c1e",
                        "on-primary-container": "#7c839b",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary": "#000000",
                        "surface-bright": "#f7f9fb",
                        "on-surface-variant": "#45464d",
                        "primary": "#0f172a",
                        "on-primary-fixed-variant": "#3f465c",
                        "surface-container": "#eceef0",
                        "outline": "#76777d",
                        "background": "#f7f9fb",
                        "surface-dim": "#d8dadc",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "surface-tint": "#565e74"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-desktop": "32px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "sidebar-width": "280px",
                        "container-max": "1440px",
                        "margin-mobile": "16px",
                        "stack-sm": "8px",
                        "gutter": "24px"
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        .glass-background {
            background: radial-gradient(circle at top right, rgba(70, 72, 212, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(172, 89, 251, 0.05), transparent);
        }
        .dark .glass-background {
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.08), transparent),
                        radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.08), transparent);
        }
        .login-card {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 10px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }
        .dark .login-card {
            box-shadow: 0 4px 30px -2px rgba(0, 0, 0, 0.2), 0 2px 15px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #1e293b;
        }
        .input-focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.4);
            border-color: #4648d4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
    </style>
</head>
<body class="bg-surface dark:bg-slate-950 text-on-surface dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 glass-background transition-colors duration-300">

    <!-- Theme switch button top right -->
    <div class="absolute top-6 right-6">
        <button onclick="toggleDarkMode()" class="hover:bg-slate-200/50 dark:hover:bg-slate-800 rounded-full p-2.5 transition-all text-on-surface-variant dark:text-slate-400 flex items-center justify-center border border-outline-variant/30 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50" title="Toggle Theme">
            <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
        </button>
    </div>

    <!-- Brand Anchor -->
    <div class="mb-8 text-center animate-in fade-in slide-in-from-top-4 duration-500">
        <h1 class="text-2xl font-extrabold tracking-tight text-primary dark:text-white flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-indigo-650 font-bold" style="font-variation-settings: 'FILL' 1;">dataset</span>
            Nexus CRM
        </h1>
        <p class="text-[10px] font-bold text-outline dark:text-slate-400 tracking-wider uppercase mt-1">Enterprise Edition</p>
    </div>

    <!-- Main Auth Card -->
    <main class="w-full max-w-[400px] bg-white dark:bg-slate-900 rounded-2xl login-card overflow-hidden transition-all duration-300 animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="px-8 pt-8 pb-10 flex flex-col items-center">
            
            <!-- User Profile Header -->
            <div class="relative mb-6">
                <div id="avatar-container" class="w-20 h-20 rounded-full border-2 border-indigo-500/30 p-1 flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-650 shadow-inner">
                    <span id="avatar-initials" class="text-white font-bold text-2xl uppercase">JD</span>
                </div>
                <div class="absolute bottom-0.5 right-0.5 bg-indigo-600 text-white p-1 rounded-full border border-white dark:border-slate-900 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[13px] font-bold" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                </div>
            </div>
            
            <div class="text-center mb-6">
                <h2 id="profile-name" class="text-lg font-bold text-slate-900 dark:text-white">Jane Doe</h2>
                <p id="profile-role" class="text-xs text-slate-500 dark:text-slate-400 text-ellipsis overflow-hidden max-w-[340px]">jane.doe@nexus.com</p>
            </div>
            
            <!-- Login Form -->
            <form action="index.html" class="w-full space-y-4" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1.5" for="username">Username</label>
                    <input class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-850 border border-outline-variant/60 dark:border-slate-800 rounded-lg text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 input-focus-ring transition-all" id="username" name="username" placeholder="e.g. Jane Doe" required="" type="text" value="Jane Doe" oninput="updateProfileName()"/>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1.5" for="email">Email Address</label>
                    <input class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-850 border border-outline-variant/60 dark:border-slate-800 rounded-lg text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 input-focus-ring transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email" value="jane.doe@nexus.com" oninput="updateProfileEmail()"/>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1.5" for="password">Password</label>
                    <div class="relative">
                        <input class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-850 border border-outline-variant/60 dark:border-slate-800 rounded-lg text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required="" type="password" value="password"/>
                        <button onclick="togglePasswordVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors flex items-center justify-center" type="button" title="Show/Hide Password">
                            <span id="password-toggle-icon" class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input class="w-4 h-4 text-indigo-600 border-outline-variant dark:border-slate-800 rounded focus:ring-indigo-500 bg-slate-50 dark:bg-slate-800" id="remember" type="checkbox"/>
                        <label class="ml-2 text-xs font-medium text-slate-550 dark:text-slate-400 cursor-pointer" for="remember">Stay signed in</label>
                    </div>
                    <a class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline" href="#">Forgot Password?</a>
                </div>
                
                <button class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-600 dark:hover:bg-indigo-700 text-white font-semibold text-xs rounded-lg shadow-sm transition-all duration-200 active:scale-[0.98] flex justify-center items-center gap-1.5" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
                </button>
            </form>
            
            <div class="mt-6 pt-5 border-t border-outline-variant/50 dark:border-slate-800 w-full text-center">
                <button onclick="clearForm()" class="text-xs font-semibold text-slate-550 dark:text-slate-450 hover:text-slate-900 dark:hover:text-white transition-colors flex items-center justify-center gap-2 mx-auto">
                    <span class="material-symbols-outlined text-[16px]">clear_all</span>
                    Clear Form
                </button>
            </div>
        </div>
    </main>

    <!-- Global Footer Branding -->
    <footer class="mt-8 flex flex-col items-center gap-1.5 opacity-60">
        <div class="flex items-center gap-3 text-slate-500 dark:text-slate-400 text-[10px] font-semibold">
            <a class="hover:text-primary dark:hover:text-white transition-colors" href="#">Security Policy</a>
            <span>•</span>
            <a class="hover:text-primary dark:hover:text-white transition-colors" href="#">System Status</a>
            <span>•</span>
            <a class="hover:text-primary dark:hover:text-white transition-colors" href="#">Help Desk</a>
        </div>
        <p class="text-[10px] text-slate-500 dark:text-slate-400">© 2026 Nexus CRM. All rights reserved.</p>
    </footer>

    <!-- Scripting -->
    <script>
        // Check dark mode state on load
        document.addEventListener('DOMContentLoaded', () => {
            // Match main application theme if saved or dark-mode active
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
                document.getElementById("theme-icon").textContent = "light_mode";
            }
            updateProfileName();
            updateProfileEmail();
        });

        // Theme Toggle
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById("theme-icon");
            if (html.classList.contains("light")) {
                html.classList.remove("light");
                html.classList.add("dark");
                icon.textContent = "light_mode";
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.remove("dark");
                html.classList.add("light");
                icon.textContent = "dark_mode";
                localStorage.setItem('theme', 'light');
            }
        }

        // Show / Hide password
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Handle Form Submission with smooth transition/validation
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            
            // Save user details to localStorage so index.html can load them dynamically!
            localStorage.setItem('crm_user_name', username);
            localStorage.setItem('crm_user_email', email);
            
            // Premium notification toast
            const body = document.body;
            const toast = document.createElement('div');
            toast.className = "fixed bottom-5 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 text-xs px-4 py-3 rounded-lg shadow-xl flex items-center gap-2 border border-slate-700/50 transition-all transform translate-y-10 z-50 opacity-0";
            toast.innerHTML = `<span class="material-symbols-outlined text-green-500 font-bold">check_circle</span> Welcome ${username}! Access granted.`;
            body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 100);

            // Redirect after delay
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1200);
        }

        // Dynamically update profile display from inputs
        function updateProfileName() {
            const username = document.getElementById('username').value;
            const nameEl = document.getElementById('profile-name');
            const initialsEl = document.getElementById('avatar-initials');
            
            if (username.trim() !== "") {
                nameEl.textContent = username;
                // Generate initials
                const parts = username.trim().split(/\s+/);
                let initials = "";
                if (parts.length > 0 && parts[0]) initials += parts[0][0];
                if (parts.length > 1 && parts[1]) initials += parts[1][0];
                initialsEl.textContent = initials.substring(0, 2).toUpperCase() || "?";
            } else {
                nameEl.textContent = "Guest User";
                initialsEl.textContent = "?";
            }
        }

        function updateProfileEmail() {
            const email = document.getElementById('email').value;
            const roleEl = document.getElementById('profile-role');
            if (email.trim() !== "") {
                roleEl.textContent = email;
            } else {
                roleEl.textContent = "No email provided";
            }
        }

        // Clear Form fields
        function clearForm() {
            document.getElementById('username').value = "";
            document.getElementById('email').value = "";
            document.getElementById('password').value = "";
            updateProfileName();
            updateProfileEmail();
        }
    </script>
</body>
</html>
